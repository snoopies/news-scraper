name: News Scraper

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # 每天运行一次（UTC 时间 00:00，北京时间 08:00）
    - cron: '0 0 * * *'

jobs:
  scrape-news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run news scraper
      run: |
        python scrape_news.py

    - name: Upload Excel artifact
      uses: actions/upload-artifact@v4
      with:
        name: news-excel
        path: news_list_*.xlsx
        retention-days: 30

    - name: Upload JSON output
      uses: actions/upload-artifact@v4
      with:
        name: news-json
        path: news_output.json
        retention-days: 30

    - name: Display news summary
      run: |
        echo "📰 News Scraping Summary"
        echo "========================"
        if [ -f news_output.json ]; then
          python -c "import json; data = json.load(open('news_output.json')); print(f'Total: {data[\"total\"]} articles'); print(f'NYT: {data[\"nyt_count\"]} articles'); print(f'AOL: {data[\"aol_count\"]} articles')"
        fi
